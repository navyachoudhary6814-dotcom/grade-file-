<!DOCTYPE html>
<html>
<head>

<title>Gradify - Profile</title>

<link rel="stylesheet" href="profile.css">

</head>

<body>

<div class="main">



<h1 class="title">PROFILE</h1>

<div class="container">
    <h2 class="welcome-box">

<img src="profile.png" class="profile-pic">

<div>
Welcome, <span id="name"></span> 👋
</div>

</h2>



<div class="card-container">

<div class="card">
<b>Email</b><br>
<span id="email"></span>
</div>

<div class="card">
<b>Phone</b><br>
<span id="phone"></span>
</div>

<div class="card">
<b>Address</b><br>
<span id="address"></span>
</div>

<div class="card">
<b>Father Name</b><br>
<span id="father"></span>
</div>

<div class="card">
<b>Mother Name</b><br>
<span id="mother"></span>
</div>

<div class="card">
<b>Date of Birth</b><br>
<span id="dob"></span>
</div>

<div class="card">
<b>Blood Group</b><br>
<span id="blood"></span>
</div>

</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script src="progress.js"></script>

</body>
</html>
